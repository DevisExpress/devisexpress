let draft=null,step=1,currentView='home',activeMetierTab=0,profileTab='profil',tarifJob='Plombier',jobFilter='Tous',jobSearch='';
function escapeAttr(v){return String(v??'').replace(/&/g,'&amp;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function load(){const r=localStorage.getItem(STORE);if(r)try{data={...data,...JSON.parse(r)};}catch(e){};if(!data.tarifs)data.tarifs={};migrateOld();}
function migrateOld(){data.quotes=(data.quotes||[]).map(q=>{if(!q.metiers)q.metiers=[data.pro.metier||'Plombier'];q.items=(q.items||[]).map((it,idx)=>it.key?it:{...it,metier:q.metiers[0]||data.pro.metier||'Plombier',key:(q.metiers[0]||data.pro.metier||'Plombier')+'__'+it.name+'__old_'+idx});return q;});}
function job(n){return JOBS.find(j=>j.n===n)||JOBS[0];}
function initTarifs(n){if(!data.tarifs[n])data.tarifs[n]=job(n).p.map(x=>({name:x[0],price:x[1],unit:x[2]}));}
function getCat(n){initTarifs(n);return data.tarifs[n];}
function devNum(){return 'DEV-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);}
function invoiceNum(){return 'FAC-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);}
function val(id){return(document.getElementById(id)?.value||'').trim();}
function totals(q){const ht=(q.items||[]).reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0),tva=Math.round(ht*(data.pro.tva||0)/100);return{ht,tva,ttc:ht+tva};}
function statusLabel(s){return{draft:'BROUILLON',sent:'ENVOYÉ',follow:'À RELANCER',accepted:'ACCEPTÉ',refused:'REFUSÉ',invoiced:'FACTURÉ',paid:'PAYÉ'}[s]||s;}

function quoteRows(arr){if(!arr.length)return'<div class="empty">Aucun devis pour le moment.<br><br>Appuyez sur <strong>➕ Nouveau devis</strong> pour commencer.</div>';return arr.map(q=>{const t=totals(q);return`<div class="quote-row" onclick="openQuote('${escapeAttr(q.id)}')"><div><strong>${escapeHtml(q.client.name)}</strong><span>${escapeHtml(q.invoiceId||q.id)} · ${new Date(q.date).toLocaleDateString('fr-FR')} · ${escapeHtml((q.metiers||[]).join(' + '))} · ${(q.items||[]).length} ligne(s)</span></div><div style="text-align:right"><div class="money">${fmtEUR(t.ttc)}</div><div class="status s-${q.status}">${statusLabel(q.status)}</div></div></div>`;}).join('');}

function flushClient(){if(!draft)return;draft.client={name:val('cName')||draft.client.name||'',phone:val('cPhone')||draft.client.phone||'',email:val('cEmail')||draft.client.email||'',address:val('cAddress')||draft.client.address||''};draft.note=val('cNote')||draft.note||'';}
function goStep(n){flushClient();step=n;renderQuote();scrollTo(0,0);}
function renderQuote(){if(!draft)startQuote();if(!draft.metiers)draft.metiers=[data.pro.metier];const bar=`<div class="stepbar"><div class="step ${step===1?'active':step>1?'done':''}" onclick="goStep(1)">① Client</div><div class="step ${step===2?'active':step>2?'done':''}" onclick="goStep(2)">② Prestations</div><div class="step ${step===3?'active':''}" onclick="goStep(3)">③ Aperçu</div></div>`;let html=`<div class="hgroup"><h2>Nouveau devis</h2><p>Étape ${step}/3 · multi-métiers possible</p></div>${bar}`;if(step===1)html+=stepClient();if(step===2)html+=stepItems();if(step===3)html+=previewHtml(draft,true);viewQuote.innerHTML=html;}
function stepClient(){return`<div class="form"><div class="quick"><button class="btn btn-ghost" onclick="fillExampleClient()">⚡ Exemple rapide</button><button class="btn btn-ghost" onclick="useLastClient()">👥 Dernier client</button></div><div><label class="label">Nom client *</label><input class="input" id="cName" value="${escapeAttr(draft.client.name)}" placeholder="Ex : Famille Martin" oninput="draft.client.name=this.value" autocomplete="name"></div><div class="row"><div><label class="label">Téléphone</label><input class="input" id="cPhone" value="${escapeAttr(draft.client.phone)}" placeholder="06 12 34 56 78" oninput="draft.client.phone=this.value" inputmode="tel" autocomplete="tel"></div><div><label class="label">Email</label><input class="input" id="cEmail" value="${escapeAttr(draft.client.email)}" placeholder="client@email.fr" oninput="draft.client.email=this.value" inputmode="email" autocomplete="email"></div></div><div><label class="label">Adresse chantier</label><input class="input" id="cAddress" value="${escapeAttr(draft.client.address)}" placeholder="Adresse complète" oninput="draft.client.address=this.value" autocomplete="street-address"></div><div><label class="label">Notes / description</label><textarea class="textarea" id="cNote" placeholder="Décrivez l'intervention..." oninput="draft.note=this.value">${escapeHtml(draft.note||'')}</textarea></div><div><label class="label">Type intervention</label><div class="chips">${['Urgence','Rénovation','Installation','Entretien','Diagnostic'].map(x=>`<button class="chip ${draft.type===x?'sel':''}" onclick="draft.type='${x}';renderQuote()">${x}</button>`).join('')}</div></div><button class="btn btn-primary full" onclick="goStep(2)">Choisir les prestations →</button></div>`;}
function fillExampleClient(){draft.client={name:'Client devis',phone:'',email:'',address:''};draft.note='Intervention à chiffrer sur place.';renderQuote();}
function useLastClient(){const c=(data.clients||[]).slice().reverse()[0];if(!c)return toast('Aucun client enregistré');draft.client={...c};renderQuote();toast('✅ Dernier client ajouté');}
function stepItems(){if(activeMetierTab>=draft.metiers.length)activeMetierTab=0;const tabs=draft.metiers.map((m,i)=>{const j=job(m);return`<button class="mtab ${i===activeMetierTab?'active':''}" onclick="activeMetierTab=${i};renderQuote()">${j.i} ${escapeHtml(j.n)}${draft.metiers.length>1?`<span class="x" onclick="event.stopPropagation();removeMetier(${i})">✕</span>`:''}</button>`}).join('');const cur=draft.metiers[activeMetierTab],cat=getCat(cur),t=totals(draft);return`<div><label class="label">Corps de métier du devis</label><div class="mtabs">${tabs}<button class="mtab" onclick="openJobPicker()">＋ Métier</button></div></div><div class="list">${cat.map(p=>prestHtml(cur,p)).join('')}</div><button class="btn btn-ghost full" style="margin-top:10px" onclick="openCustomItem()">➕ Ajouter une ligne personnalisée</button><div class="totalbar"><div><div class="small">Total HT</div><div class="totalht">${fmtEUR(t.ht)}</div><div class="small">TVA ${data.pro.tva}% · TTC ${fmtEUR(t.ttc)}</div></div><button class="btn btn-primary" onclick="goStep(3)">Aperçu →</button></div>`;}
function removeMetier(i){const m=draft.metiers[i];draft.metiers.splice(i,1);draft.items=draft.items.filter(x=>x.metier!==m);if(!draft.metiers.length)draft.metiers=[data.pro.metier];activeMetierTab=Math.max(0,activeMetierTab-1);renderQuote();}

function renderJobPickerList(q='',cat='Tous'){const box=document.getElementById('jobPickerList');if(!box)return;const s=q.toLowerCase();box.innerHTML=JOBS.filter(j=>!draft.metiers.includes(j.n)).filter(j=>(cat==='Tous'||j.c===cat)&&(!s||j.n.toLowerCase().includes(s)||j.c.toLowerCase().includes(s))).map(j=>`<div class="job-row" onclick="addMetier('${escapeAttr(j.n)}')"><div><strong>${j.i} ${escapeHtml(j.n)}${j.g?'<span class="growth">⭐ croissance</span>':''}</strong><span>${escapeHtml(j.c)} · ${j.p.length} prestations de base</span></div><button class="btn btn-primary btn-small">Ajouter</button></div>`).join('')||'<div class="empty">Aucun métier trouvé.</div>';}

function prestHtml(m,p){const key=m+'__'+p.name;const item=draft.items.find(i=>i.key===key),sel=!!item;const ek=encodeURIComponent(key);return`<div class="prestation ${sel?'sel':''}" onclick="toggleItemByKey('${ek}')"><div class="check">${sel?'✓':'○'}</div><div><div class="pname">${escapeHtml(p.name)}</div><div class="punit">${escapeHtml(m)} · ${fmtEUR(p.price)} / ${escapeHtml(p.unit)}</div></div><div class="money">${sel?fmtEUR(item.price*item.qty):fmtEUR(p.price)}</div>${sel?`<div class="line-edit" onclick="event.stopPropagation()"><div><label class="label">Prix HT</label><input class="input" type="number" value="${escapeAttr(item.price)}" onchange="setPriceKey('${ek}',this.value)"></div><div><label class="label">Unité</label><input class="input" value="${escapeAttr(item.unit)}" onchange="setUnitKey('${ek}',this.value)"></div></div><div class="qty" onclick="event.stopPropagation()"><span class="small">Quantité</span><div class="qty-controls"><button type="button" onclick="chgQtyKey('${ek}',-1);event.stopPropagation()">−</button><input class="input" value="${escapeAttr(item.qty)}" onchange="setQtyKey('${ek}',this.value)" onclick="event.stopPropagation()" style="width:68px;text-align:center"><button type="button" onclick="chgQtyKey('${ek}',1);event.stopPropagation()">+</button></div></div>`:''}</div>`;}
function toggleItemByKey(encodedKey){const key=decodeURIComponent(encodedKey);const [metier,name]=key.split('__');const cat=getCat(metier);const p=cat.find(x=>x.name===name);if(!p)return;const i=draft.items.findIndex(x=>x.key===key);if(i>=0)draft.items.splice(i,1);else draft.items.push({key,metier,name:p.name,price:p.price,unit:p.unit,qty:1});renderQuote();}
