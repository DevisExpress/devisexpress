const START_JOBS=['Plombier','Électricien','Peintre','Menuisier','Carreleur','Maçon','Climatisation','Borne VE IRVE','Nettoyage Airbnb','Création site web'];
let data={pro:{name:'',company:'',phone:'',email:'',siret:'',address:'',metier:'Plombier',icon:'🔧',tva:10,validity:30,terms:'Devis valable 30 jours. Acompte de 30% à la commande. Solde à réception de facture.'},tarifs:{},quotes:[],clients:[]};
let draft=null,step=1,currentView='home',activeMetierTab=0,profileTab='profil',tarifJob='Plombier',jobFilter='Tous',jobSearch='';
function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function load(){const r=localStorage.getItem(STORE);if(r)try{data={...data,...JSON.parse(r)};}catch(e){};if(!data.tarifs)data.tarifs={};migrateOld();}
function migrateOld(){data.quotes=(data.quotes||[]).map(q=>{if(!q.metiers)q.metiers=[data.pro.metier||'Plombier'];q.items=(q.items||[]).map((it,idx)=>it.key?it:{...it,metier:q.metiers[0]||data.pro.metier||'Plombier',key:(q.metiers[0]||data.pro.metier||'Plombier')+'__'+it.name+'__old_'+idx});return q;});}
function job(n){return JOBS.find(j=>j.n===n)||JOBS[0];}
function initTarifs(n){if(!data.tarifs[n])data.tarifs[n]=job(n).p.map(x=>({name:x[0],price:x[1],unit:x[2]}));}
function getCat(n){initTarifs(n);return data.tarifs[n];}
function devNum(){return 'DEV-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);}
function val(id){return(document.getElementById(id)?.value||'').trim();}
function totals(q){const ht=(q.items||[]).reduce((s,i)=>s+(+i.price||0)*(+i.qty||0),0),tva=Math.round(ht*(data.pro.tva||0)/100);return{ht,tva,ttc:ht+tva};}
function statusLabel(s){return{draft:'BROUILLON',sent:'ENVOYÉ',follow:'À RELANCER',accepted:'ACCEPTÉ',refused:'REFUSÉ',invoiced:'FACTURÉ',paid:'PAYÉ'}[s]||s;}
function init(){load();renderMetiers();if(data.pro.company)proCompanyStart.value=data.pro.company;if(data.pro.name)proNameStart.value=data.pro.name;updateTop();renderAll();}
function renderMetiers(){const g=document.getElementById('metierGrid');g.innerHTML='';START_JOBS.forEach(n=>{const j=job(n);const b=document.createElement('button');b.className='metier'+(n===data.pro.metier?' sel':'');b.innerHTML='<span>'+j.i+'</span>'+j.n+(j.g?'<br><small style="color:#fcd34d">en croissance</small>':'');b.onclick=()=>{data.pro.metier=j.n;data.pro.icon=j.i;renderMetiers();updateTop();};g.appendChild(b);});}
function enterApp(){const n=val('proNameStart'),c=val('proCompanyStart');if(!n)return toast('⚠️ Entrez votre prénom');data.pro.name=n;data.pro.company=c||n;save();updateTop();login.classList.remove('active');appScreen.classList.add('active');renderAll();}
function updateTop(){const j=job(data.pro.metier);data.pro.icon=j.i;metierBadge.textContent=j.i+' '+j.n;avatar.textContent=(data.pro.name||'?')[0].toUpperCase();}
function setView(v,btn){currentView=v;['Home','Quote','Clients','Follow','Profile'].forEach(x=>document.getElementById('view'+x).style.display='none');document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).style.display='block';document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderAll();scrollTo(0,0);}
function renderAll(){renderHome();renderQuote();renderClients();renderFollow();renderProfile();}
function renderHome(){const q=data.quotes||[],sent=q.filter(x=>['sent','follow'].includes(x.status)).length,acc=q.filter(x=>x.status==='accepted'||x.status==='paid'||x.status==='invoiced').length,follow=q.filter(x=>x.status==='follow'||x.status==='sent').length,ca=q.filter(x=>x.status!=='refused').reduce((s,x)=>s+totals(x).ttc,0);viewHome.innerHTML=`<div class="hgroup"><h2>Bonjour, ${data.pro.name||'!'} 👋</h2><p>${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${follow} devis à suivre</p></div><div class="cards"><div class="card"><div class="stat-label">Devis</div><div class="stat-val">${q.length}</div><div class="stat-sub">créés</div></div><div class="card"><div class="stat-label">Acceptés</div><div class="stat-val">${acc}</div><div class="stat-sub">${q.length?Math.round(acc/q.length*100):0}%</div></div><div class="card"><div class="stat-label">CA TTC</div><div class="stat-val" style="font-size:16px">${fmtEUR(ca)}</div><div class="stat-sub">estimé</div></div></div><div class="quick"><button class="btn btn-primary" onclick="startQuote();setView('quote',document.querySelectorAll('.nav button')[1])">➕ Nouveau devis</button><button class="btn btn-ghost" onclick="openClientSheet()">👥 Ajouter client</button><button class="btn btn-blue" onclick="setView('follow',document.querySelectorAll('.nav button')[3])">📊 Suivre activité</button></div><div class="section-title"><span>Derniers devis</span><button class="btn btn-ghost btn-small" onclick="setView('follow',document.querySelectorAll('.nav button')[3])">Tout voir</button></div><div class="list">${quoteRows(q.slice().reverse().slice(0,6))}</div>`;}
function quoteRows(arr){if(!arr.length)return'<div class="empty">Aucun devis pour le moment.<br><br>Appuyez sur <strong>➕ Nouveau devis</strong> pour commencer.</div>';return arr.map(q=>{const t=totals(q);return`<div class="quote-row" onclick="openQuote('${q.id}')"><div><strong>${q.client.name}</strong><span>${q.id} · ${new Date(q.date).toLocaleDateString('fr-FR')} · ${(q.metiers||[]).join(' + ')} · ${(q.items||[]).length} ligne(s)</span></div><div style="text-align:right"><div class="money">${fmtEUR(t.ttc)}</div><div class="status s-${q.status}">${statusLabel(q.status)}</div></div></div>`;}).join('');}
function startQuote(){draft={id:devNum(),date:new Date().toISOString(),status:'draft',client:{name:'',phone:'',email:'',address:''},items:[],type:'Intervention',note:'',metiers:[data.pro.metier]};step=1;activeMetierTab=0;}
function flushClient(){if(!draft)return;draft.client={name:val('cName')||draft.client.name||'',phone:val('cPhone')||draft.client.phone||'',email:val('cEmail')||draft.client.email||'',address:val('cAddress')||draft.client.address||''};draft.note=val('cNote')||draft.note||'';}
function goStep(n){flushClient();step=n;renderQuote();scrollTo(0,0);}
function renderQuote(){if(!draft)startQuote();if(!draft.metiers)draft.metiers=[data.pro.metier];const bar=`<div class="stepbar"><div class="step ${step===1?'active':step>1?'done':''}" onclick="goStep(1)">① Client</div><div class="step ${step===2?'active':step>2?'done':''}" onclick="goStep(2)">② Prestations</div><div class="step ${step===3?'active':''}" onclick="goStep(3)">③ Aperçu</div></div>`;let html=`<div class="hgroup"><h2>Nouveau devis</h2><p>Étape ${step}/3 · multi-métiers possible</p></div>${bar}`;if(step===1)html+=stepClient();if(step===2)html+=stepItems();if(step===3)html+=previewHtml(draft,true);viewQuote.innerHTML=html;}
function stepClient(){return`<div class="form"><div class="quick"><button class="btn btn-ghost" onclick="fillExampleClient()">⚡ Exemple rapide</button><button class="btn btn-ghost" onclick="useLastClient()">👥 Dernier client</button></div><div><label class="label">Nom client *</label><input class="input" id="cName" value="${draft.client.name}" placeholder="Ex : Famille Martin" oninput="draft.client.name=this.value" autocomplete="name"></div><div class="row"><div><label class="label">Téléphone</label><input class="input" id="cPhone" value="${draft.client.phone}" placeholder="06 12 34 56 78" oninput="draft.client.phone=this.value" inputmode="tel" autocomplete="tel"></div><div><label class="label">Email</label><input class="input" id="cEmail" value="${draft.client.email}" placeholder="client@email.fr" oninput="draft.client.email=this.value" inputmode="email" autocomplete="email"></div></div><div><label class="label">Adresse chantier</label><input class="input" id="cAddress" value="${draft.client.address}" placeholder="Adresse complète" oninput="draft.client.address=this.value" autocomplete="street-address"></div><div><label class="label">Notes / description</label><textarea class="textarea" id="cNote" placeholder="Décrivez l'intervention..." oninput="draft.note=this.value">${draft.note||''}</textarea></div><div><label class="label">Type intervention</label><div class="chips">${['Urgence','Rénovation','Installation','Entretien','Diagnostic'].map(x=>`<button class="chip ${draft.type===x?'sel':''}" onclick="draft.type='${x}';renderQuote()">${x}</button>`).join('')}</div></div><button class="btn btn-primary full" onclick="goStep(2)">Choisir les prestations →</button></div>`;}
function fillExampleClient(){draft.client={name:'Client devis',phone:'',email:'',address:''};draft.note='Intervention à chiffrer sur place.';renderQuote();}
function useLastClient(){const c=(data.clients||[]).slice().reverse()[0];if(!c)return toast('Aucun client enregistré');draft.client={...c};renderQuote();toast('✅ Dernier client ajouté');}
function stepItems(){if(activeMetierTab>=draft.metiers.length)activeMetierTab=0;const tabs=draft.metiers.map((m,i)=>{const j=job(m);return`<button class="mtab ${i===activeMetierTab?'active':''}" onclick="activeMetierTab=${i};renderQuote()">${j.i} ${j.n}${draft.metiers.length>1?`<span class="x" onclick="event.stopPropagation();removeMetier(${i})">✕</span>`:''}</button>`}).join('');const cur=draft.metiers[activeMetierTab],cat=getCat(cur),t=totals(draft);return`<div><label class="label">Corps de métier du devis</label><div class="mtabs">${tabs}<button class="mtab" onclick="openJobPicker()">＋ Métier</button></div></div><div class="list">${cat.map(p=>prestHtml(cur,p)).join('')}</div><button class="btn btn-ghost full" style="margin-top:10px" onclick="openCustomItem()">➕ Ajouter une ligne personnalisée</button><div class="totalbar"><div><div class="small">Total HT</div><div class="totalht">${fmtEUR(t.ht)}</div><div class="small">TVA ${data.pro.tva}% · TTC ${fmtEUR(t.ttc)}</div></div><button class="btn btn-primary" onclick="goStep(3)">Aperçu →</button></div>`;}
function removeMetier(i){const m=draft.metiers[i];draft.metiers.splice(i,1);draft.items=draft.items.filter(x=>x.metier!==m);if(!draft.metiers.length)draft.metiers=[data.pro.metier];activeMetierTab=Math.max(0,activeMetierTab-1);renderQuote();}
function openJobPicker(){sheet(`<h3>Ajouter un métier</h3><input id="jobSearchModal" class="input" placeholder="Rechercher : clim, borne, nettoyage..." oninput="renderJobPickerList(this.value)"><div class="chips" style="margin:10px 0">${CATEGORIES.map(c=>`<button class="chip" onclick="renderJobPickerList(document.getElementById('jobSearchModal').value,'${c}')">${c}</button>`).join('')}</div><div id="jobPickerList"></div>`);renderJobPickerList('','Tous');}
function renderJobPickerList(q='',cat='Tous'){const box=document.getElementById('jobPickerList');if(!box)return;const s=q.toLowerCase();box.innerHTML=JOBS.filter(j=>!draft.metiers.includes(j.n)).filter(j=>(cat==='Tous'||j.c===cat)&&(!s||j.n.toLowerCase().includes(s)||j.c.toLowerCase().includes(s))).map(j=>`<div class="job-row" onclick="addMetier('${j.n}')"><div><strong>${j.i} ${j.n}${j.g?'<span class="growth">⭐ croissance</span>':''}</strong><span>${j.c} · ${j.p.length} prestations de base</span></div><button class="btn btn-primary btn-small">Ajouter</button></div>`).join('')||'<div class="empty">Aucun métier trouvé.</div>';}
function addMetier(n){if(!draft.metiers.includes(n)){draft.metiers.push(n);activeMetierTab=draft.metiers.length-1;}closeModal();renderQuote();}
function prestHtml(m,p){const key=m+'__'+p.name;const item=draft.items.find(i=>i.key===key),sel=!!item;const safe=s=>String(s).replace(/\/g,'\\').replace(/'/g,"\'");const ek=encodeURIComponent(key);return`<div class="prestation ${sel?'sel':''}" onclick="toggleItem('${safe(m)}','${safe(p.name)}',${p.price},'${safe(p.unit)}')"><div class="check">${sel?'✓':'○'}</div><div><div class="pname">${p.name}</div><div class="punit">${m} · ${p.price} € / ${p.unit}</div></div><div class="money">${sel?fmtEUR(item.price*item.qty):fmtEUR(p.price)}</div>${sel?`<div class="line-edit" onclick="event.stopPropagation()"><div><label class="label">Prix HT</label><input class="input" type="number" value="${item.price}" onchange="setPriceKey('${ek}',this.value)"></div><div><label class="label">Unité</label><input class="input" value="${item.unit}" onchange="setUnitKey('${ek}',this.value)"></div></div><div class="qty" onclick="event.stopPropagation()"><span class="small">Quantité</span><div class="qty-controls"><button type="button" onclick="chgQtyKey('${ek}',-1);event.stopPropagation()">−</button><input class="input" value="${item.qty}" onchange="setQtyKey('${ek}',this.value)" onclick="event.stopPropagation()" style="width:68px;text-align:center"><button type="button" onclick="chgQtyKey('${ek}',1);event.stopPropagation()">+</button></div></div>`:''}</div>`;}
function toggleItem(metier,name,price,unit){const key=metier+'__'+name;const i=draft.items.findIndex(x=>x.key===key);if(i>=0)draft.items.splice(i,1);else draft.items.push({key,metier,name,price,unit,qty:1});renderQuote();}
function chgQty(key,d){const i=draft.items.find(x=>x.key===key);if(i){i.qty=Math.max(1,(+i.qty||1)+d);renderQuote();}}
function setQty(key,v){const i=draft.items.find(x=>x.key===key);if(i){i.qty=Math.max(1,parseFloat(v)||1);renderQuote();}}
function chgQtyKey(k,d){chgQty(decodeURIComponent(k),d)}
function setQtyKey(k,v){setQty(decodeURIComponent(k),v)}
function setPriceKey(k,v){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i){i.price=Math.max(0,parseFloat(v)||0);renderQuote();}}
function setUnitKey(k,v){const i=draft.items.find(x=>x.key===decodeURIComponent(k));if(i){i.unit=v||'forfait';renderQuote();}}
function openCustomItem(){const m=draft.metiers[activeMetierTab];sheet(`<h3>➕ Prestation personnalisée</h3><p class="small" style="margin-bottom:10px">Métier : <strong>${m}</strong></p><div class="form"><div><label class="label">Désignation *</label><input id="xName" class="input" placeholder="Ex : Déplacement urgence"></div><div class="row"><div><label class="label">Prix HT (€) *</label><input id="xPrice" class="input" type="number" placeholder="0" min="0"></div><div><label class="label">Unité</label><input id="xUnit" class="input" placeholder="h, m², forfait, u."></div></div><div><label class="label">Quantité</label><input id="xQty" class="input" type="number" value="1" min="1"></div><button class="btn btn-primary full" onclick="addCustomItem()">Ajouter au devis</button></div>`);}
function addCustomItem(){const name=val('xName'),price=parseFloat(val('xPrice')),unit=val('xUnit')||'forfait',qty=parseFloat(val('xQty'))||1;if(!name||!price)return toast('⚠️ Désignation et prix obligatoires');const metier=draft.metiers[activeMetierTab]||data.pro.metier;draft.items.push({key:metier+'__'+name+'__custom_'+Date.now(),metier,name,price,unit,qty});closeModal();renderQuote();toast('✅ Prestation ajoutée');}
function previewHtml(q,withActions){const t=totals(q),exp=new Date(q.date);exp.setDate(exp.getDate()+(data.pro.validity||30));const rows=(q.items||[]).map(i=>`<tr><td>${i.metier?'<strong style="color:#111827">'+i.metier+'</strong><br>':''}${i.name}</td><td style="text-align:center">${i.qty}</td><td>${i.unit}</td><td style="text-align:right">${fmtEUR(i.price)}</td><td style="text-align:right;font-weight:bold">${fmtEUR(i.price*i.qty)}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:12px">Aucune prestation sélectionnée</td></tr>';return`<div class="pdf" id="pdfArea"><div class="pdf-head"><div><div class="pdf-logo">${data.pro.company||'DevisExpress'}<span>.</span></div><div class="pdf-muted" style="margin-top:5px"><strong style="color:#111827">${(q.metiers||[data.pro.metier]).join(' · ')}</strong><br>${data.pro.phone||''}<br>${data.pro.email||''}<br>${data.pro.siret?'SIRET : '+data.pro.siret:''}<br>${data.pro.address||''}</div></div><div class="pdf-muted" style="text-align:right"><strong style="color:#111827;font-size:16px">${q.id}</strong><br>Date : ${new Date(q.date).toLocaleDateString('fr-FR')}<br>Validité : ${exp.toLocaleDateString('fr-FR')}<br>Statut : ${statusLabel(q.status)}</div></div><div class="pdf-title">Client</div><div class="pdf-block"><strong>${q.client.name||'Client'}</strong><br>${q.client.address||'Adresse non renseignée'}<br>${q.client.phone?'Tél : '+q.client.phone:''}${q.client.email?' · '+q.client.email:''}</div>${q.note?`<div class="pdf-title">Notes</div><div class="pdf-block">${q.note}</div>`:''}<div class="pdf-title">Détail des prestations</div><table class="pdf-table"><thead><tr><th>Prestation</th><th style="text-align:center">Qté</th><th>Unité</th><th style="text-align:right">P.U. HT</th><th style="text-align:right">Total HT</th></tr></thead><tbody>${rows}</tbody></table><div class="pdf-totals"><div>Sous-total HT : <strong>${fmtEUR(t.ht)}</strong></div><div>TVA ${data.pro.tva}% : <strong>${fmtEUR(t.tva)}</strong></div><div class="pdf-final">Total TTC : ${fmtEUR(t.ttc)}</div></div><div class="pdf-sign"><div class="pdf-muted"><strong>${data.pro.company||data.pro.name}</strong><br>${data.pro.address||''}</div><div style="text-align:center"><div style="font-size:9px;color:#64748b;margin-bottom:4px">Bon pour accord – Signature client</div><div class="sign-box">Signature + date</div></div></div><div class="pdf-title">Conditions</div><div class="pdf-block">${data.pro.terms||'Devis valable 30 jours.'}</div><div class="pdf-footer">Devis généré avec DevisExpress</div></div>${withActions?`<div class="actions"><button class="btn btn-ghost" onclick="goStep(2)">← Modifier</button><button class="btn btn-ghost" onclick="downloadPDF(draft)">📄 PDF</button><button class="btn btn-green" onclick="saveAndShare()">📤 Enregistrer & envoyer</button></div>`:''}`;}
function saveAndShare(){flushClient();if(!draft.client.name)return toast('⚠️ Nom client obligatoire');if(!draft.items.length)return toast('⚠️ Ajoute au moins une prestation');draft.status='sent';const idx=data.quotes.findIndex(x=>x.id===draft.id);if(idx>=0)data.quotes[idx]=JSON.parse(JSON.stringify(draft));else data.quotes.push(JSON.parse(JSON.stringify(draft)));if(!data.clients.some(c=>c.name.toLowerCase()===draft.client.name.toLowerCase()))data.clients.push({...draft.client});save();const saved=data.quotes.find(x=>x.id===draft.id);toast('✅ Devis sauvegardé');startQuote();if(saved)openShareModal(saved);renderAll();}
function downloadPDF(q){const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>${q.id}</title><style>body{font-family:Arial,sans-serif;color:#111827;padding:22px;font-size:11px}.pdf{box-shadow:none}.pdf-head{display:flex;justify-content:space-between;border-bottom:3px solid #111827;padding-bottom:14px;margin-bottom:14px}.pdf-logo{font-weight:900;font-size:22px}.pdf-logo span{color:#f59e0b}.pdf-muted{color:#64748b;font-size:10px;line-height:1.7}.pdf-block{background:#f8fafc;border-left:3px solid #f59e0b;padding:10px;font-size:11px;line-height:1.7}.pdf-title{font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:14px 0 7px;font-weight:700}.pdf-table{width:100%;border-collapse:collapse;font-size:10px}.pdf-table th{background:#111827;color:white;text-align:left;padding:8px}.pdf-table td{border-bottom:1px solid #e5e7eb;padding:8px;color:#374151}.pdf-totals{text-align:right;margin-top:12px;line-height:1.9}.pdf-final{font-size:16px;font-weight:900;border-top:2px solid #111827;padding-top:5px}.pdf-sign{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #e5e7eb}.sign-box{border:1.5px dashed #cbd5e1;border-radius:6px;width:145px;height:46px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#94a3b8}.pdf-footer{border-top:1px solid #e5e7eb;margin-top:14px;padding-top:8px;text-align:center;color:#94a3b8;font-size:8px}.actions{display:none}</style></head><body>${previewHtml(q,false)}<script>window.onload=()=>setTimeout(()=>window.print(),500)<\/script></body></html>`;const w=window.open('','_blank','width=820,height=1060');if(w){w.document.write(html);w.document.close();}else toast('⚠️ Autorisez les popups pour le PDF');}
function downloadPDFById(id){const q=data.quotes.find(x=>x.id===id);if(q)downloadPDF(q);}
function openShareModal(q){const t=totals(q),tel=(q.client.phone||'').replace(/\D/g,'').replace(/^0/,'+33'),msg=`Bonjour ${q.client.name},\n\nVeuillez trouver votre devis ${q.id} pour un montant de ${fmtEUR(t.ttc)} TTC.\n\nCe devis est valable ${data.pro.validity||30} jours.\n\nCordialement,\n${data.pro.company||data.pro.name}\n${data.pro.phone||''}`;sheet(`<h3>📤 Envoyer le devis</h3><p style="font-size:12px;color:var(--mut);margin-bottom:14px">${q.id} · <strong>${q.client.name}</strong> · ${fmtEUR(t.ttc)}</p><div class="share-opts"><div class="share-opt" onclick="window.open('https://wa.me/${tel}?text=${encodeURIComponent(msg)}','_blank');closeModal();toast('💬 WhatsApp ouvert !')"><div class="share-opt-icon">💬</div><div><strong>WhatsApp</strong><span>Message résumé · joindre le PDF après</span></div></div><div class="share-opt" onclick="window.location.href='mailto:${q.client.email||''}?subject=${encodeURIComponent('Votre devis '+q.id)}&body=${encodeURIComponent(msg)}';closeModal()"><div class="share-opt-icon">📧</div><div><strong>Email</strong><span>Mail pré-rempli</span></div></div><div class="share-opt" onclick="downloadPDFById('${q.id}');closeModal()"><div class="share-opt-icon">📄</div><div><strong>Télécharger PDF</strong><span>PDF propre sans lien de site</span></div></div><div class="share-opt" onclick="copyQuoteText('${q.id}')"><div class="share-opt-icon">📋</div><div><strong>Copier le texte</strong><span>À coller dans n'importe quelle app</span></div></div></div><button class="btn btn-ghost full" style="margin-top:12px" onclick="closeModal()">Fermer</button>`);}
function copyQuoteText(id){const q=data.quotes.find(x=>x.id===id);if(!q)return;const t=totals(q);const msg=`Bonjour ${q.client.name},\n\nVotre devis ${q.id} : ${fmtEUR(t.ttc)} TTC.\nValable ${data.pro.validity||30} jours.\n\n${data.pro.company||data.pro.name}\n${data.pro.phone||''}`;if(navigator.share)navigator.share({text:msg}).catch(()=>{});else navigator.clipboard?.writeText(msg).then(()=>toast('✅ Texte copié'));closeModal();}
function shareQuote(id){const q=data.quotes.find(x=>x.id===id);if(q)openShareModal(q);}
function makeInvoice(id){const q=data.quotes.find(x=>x.id===id);if(!q)return;q.status='paid';q.invoiceId='FAC-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);save();closeModal();renderAll();toast('✅ Facture créée et marquée payée');downloadPDF(q);}
function openQuote(id){const q=data.quotes.find(x=>x.id===id);if(!q)return;sheet(previewHtml(q,false)+`<div class="actions" style="margin-top:12px"><button class="btn btn-ghost" onclick="downloadPDFById('${id}')">📄 PDF</button><button class="btn btn-green" onclick="shareQuote('${id}')">📤 Envoyer</button><button class="btn btn-red" onclick="deleteQuote('${id}')">🗑️</button></div><div class="actions" style="margin-top:8px"><button class="btn btn-ghost" onclick="changeStatus('${id}','follow')">⏰ À relancer</button><button class="btn btn-ghost" onclick="changeStatus('${id}','accepted')">✅ Accepté</button><button class="btn btn-ghost" onclick="changeStatus('${id}','invoiced')">🧾 Facturé</button></div><div class="actions" style="margin-top:8px"><button class="btn btn-green" onclick="makeInvoice('${id}')">💶 Créer facture / payé</button><button class="btn btn-ghost" onclick="changeStatus('${id}','paid')">✅ Marquer payé</button><button class="btn btn-red" onclick="changeStatus('${id}','refused')">❌ Refusé</button></div>`);}
function renderClients(){viewClients.innerHTML=`<div class="hgroup"><h2>Clients</h2><p>Carnet d'adresses sauvegardé sur cet appareil.</p></div><button class="btn btn-primary full" onclick="openClientSheet()">➕ Ajouter un client</button><div class="section-title">Liste (${data.clients.length})</div><div class="list">${data.clients.map(c=>`<div class="client-row"><div><strong>${c.name}</strong><span>${c.phone||''} ${c.email?'· '+c.email:''}<br>${c.address||''}</span></div><button class="btn btn-ghost btn-small" onclick='useClient(${JSON.stringify(c)})'>Devis</button></div>`).join('')||'<div class="empty">Aucun client enregistré.</div>'}</div>`;}
function openClientSheet(){sheet(`<h3>Nouveau client</h3><div class="form"><input id="newCName" class="input" placeholder="Nom *"><input id="newCPhone" class="input" placeholder="Téléphone"><input id="newCEmail" class="input" placeholder="Email"><input id="newCAddress" class="input" placeholder="Adresse"><button class="btn btn-primary full" onclick="addClient()">Enregistrer</button></div>`);}
function addClient(){const c={name:val('newCName'),phone:val('newCPhone'),email:val('newCEmail'),address:val('newCAddress')};if(!c.name)return toast('Nom obligatoire');data.clients.push(c);save();closeModal();renderAll();toast('✅ Client ajouté');}
function useClient(c){startQuote();draft.client={...c};closeModal();setView('quote',document.querySelectorAll('.nav button')[1]);}
function renderFollow(){const q=data.quotes||[];const count=s=>s==='Tous'?q.length:q.filter(x=>x.status===s).length;const caPaid=q.filter(x=>x.status==='paid').reduce((s,x)=>s+totals(x).ttc,0);const caWait=q.filter(x=>['sent','follow','accepted','invoiced'].includes(x.status)).reduce((s,x)=>s+totals(x).ttc,0);viewFollow.innerHTML=`<div class="hgroup"><h2>Suivi activité</h2><p>Devis, factures, relances et paiements.</p></div><div class="cards"><div class="card"><div class="stat-label">Payé</div><div class="stat-val" style="font-size:16px">${fmtEUR(caPaid)}</div><div class="stat-sub">encaissé</div></div><div class="card"><div class="stat-label">En attente</div><div class="stat-val" style="font-size:16px">${fmtEUR(caWait)}</div><div class="stat-sub">à suivre</div></div><div class="card"><div class="stat-label">Relances</div><div class="stat-val">${count('follow')}</div><div class="stat-sub">à traiter</div></div></div><div class="chips" style="margin-bottom:12px">${['Tous','sent','follow','accepted','invoiced','paid','refused'].map(s=>`<button class="chip" onclick="filterFollow('${s}')">${s==='Tous'?'Tous':statusLabel(s)} · ${count(s)}</button>`).join('')}</div><div id="followList" class="list">${quoteRows(q.slice().reverse())}</div>`;}
function filterFollow(s){const arr=s==='Tous'?data.quotes:data.quotes.filter(q=>q.status===s);document.getElementById('followList').innerHTML=quoteRows(arr.slice().reverse());}
function renderProfile(){viewProfile.innerHTML=`<div class="hgroup"><h2>Paramètres</h2><p>Profil, tarifs et base métiers.</p></div><div class="tabs"><div class="tab ${profileTab==='profil'?'active':''}" onclick="profileTab='profil';renderProfile()">👤 Profil</div><div class="tab ${profileTab==='tarifs'?'active':''}" onclick="profileTab='tarifs';renderProfile()">💶 Tarifs</div><div class="tab ${profileTab==='metiers'?'active':''}" onclick="profileTab='metiers';renderProfile()">🔎 Métiers</div></div>${profileTab==='profil'?renderProfil():profileTab==='tarifs'?renderTarifs():renderJobs()}`;}
function renderProfil(){return`<div class="form"><div class="row"><div><label class="label">Prénom</label><input id="pName" class="input" value="${data.pro.name}"></div><div><label class="label">Entreprise</label><input id="pCompany" class="input" value="${data.pro.company}"></div></div><div class="row"><div><label class="label">Téléphone</label><input id="pPhone" class="input" value="${data.pro.phone}"></div><div><label class="label">Email</label><input id="pEmail" class="input" value="${data.pro.email}"></div></div><div><label class="label">Adresse</label><input id="pAddress" class="input" value="${data.pro.address}"></div><div class="row"><div><label class="label">SIRET</label><input id="pSiret" class="input" value="${data.pro.siret}"></div><div><label class="label">TVA %</label><input id="pTva" type="number" class="input" value="${data.pro.tva}"></div></div><div><label class="label">Validité devis (jours)</label><input id="pValidity" type="number" class="input" value="${data.pro.validity}"></div><div><label class="label">Conditions générales</label><textarea id="pTerms" class="textarea">${data.pro.terms}</textarea></div><button class="btn btn-primary full" onclick="saveProfile()">💾 Sauvegarder le profil</button><div class="danger-zone"><div class="small" style="margin-bottom:8px">⚠️ Zone de réinitialisation</div><button class="btn btn-red full" onclick="resetData()">Effacer toutes les données</button></div></div>`;}
function renderTarifs(){initTarifs(tarifJob);const cat=getCat(tarifJob),j=job(tarifJob);return`<div class="form"><div><label class="label">Métier à modifier</label><input class="input" placeholder="Rechercher un métier" oninput="tarifSearch(this.value)"></div><div class="chips">${JOBS.slice(0,20).map(x=>`<button class="chip ${tarifJob===x.n?'sel':''}" onclick="tarifJob='${x.n}';renderProfile()">${x.i} ${x.n}</button>`).join('')}</div><div id="tarifSearchBox"></div></div><div class="section-title"><span>${j.i} ${j.n} · ${cat.length} prestations</span><button class="btn btn-primary btn-small" onclick="addTarif('${j.n}')">＋ Ajouter</button></div><div class="list">${cat.map((p,i)=>`<div class="client-row"><div><strong>${p.name}</strong><span>${p.unit}</span></div><div style="display:flex;gap:6px;align-items:center"><div class="money">${fmtEUR(p.price)}</div><button class="btn btn-ghost btn-small" onclick="editTarif('${j.n}',${i})">✏️</button></div></div>`).join('')}</div><button class="btn btn-ghost full" style="margin-top:12px" onclick="resetTarifs('${j.n}')">↺ Restaurer tarifs par défaut</button>`;}
function tarifSearch(q){const box=document.getElementById('tarifSearchBox'),s=q.toLowerCase();if(!box)return;box.innerHTML=s?`<div class="list" style="margin-top:10px">${JOBS.filter(j=>j.n.toLowerCase().includes(s)||j.c.toLowerCase().includes(s)).slice(0,12).map(j=>`<div class="job-row" onclick="tarifJob='${j.n}';renderProfile()"><div><strong>${j.i} ${j.n}</strong><span>${j.c}</span></div></div>`).join('')}</div>`:'';}
function editTarif(m,i){const p=data.tarifs[m][i];sheet(`<h3>Modifier tarif</h3><div class="form"><input id="tName" class="input" value="${p.name}"><input id="tPrice" type="number" class="input" value="${p.price}"><input id="tUnit" class="input" value="${p.unit}"><button class="btn btn-primary full" onclick="saveTarif('${m}',${i})">Sauvegarder</button><button class="btn btn-red full" onclick="deleteTarif('${m}',${i})">Supprimer</button></div>`);}
function saveTarif(m,i){const name=val('tName'),price=parseFloat(val('tPrice')),unit=val('tUnit')||'forfait';if(!name||!price)return toast('⚠️ Infos requises');data.tarifs[m][i]={name,price,unit};save();closeModal();renderProfile();toast('✅ Tarif modifié');}
function addTarif(m){sheet(`<h3>Ajouter prestation</h3><div class="form"><input id="tName" class="input" placeholder="Désignation"><input id="tPrice" type="number" class="input" placeholder="Prix HT"><input id="tUnit" class="input" placeholder="Unité"><button class="btn btn-primary full" onclick="confirmAddTarif('${m}')">Ajouter</button></div>`);}
function confirmAddTarif(m){const name=val('tName'),price=parseFloat(val('tPrice')),unit=val('tUnit')||'forfait';if(!name||!price)return toast('⚠️ Infos requises');initTarifs(m);data.tarifs[m].push({name,price,unit});save();closeModal();renderProfile();}
function deleteTarif(m,i){if(!confirm('Supprimer cette prestation ?'))return;data.tarifs[m].splice(i,1);save();closeModal();renderProfile();}
function resetTarifs(m){if(!confirm('Restaurer les tarifs par défaut ?'))return;delete data.tarifs[m];initTarifs(m);save();renderProfile();}
function renderJobs(){return`<div class="form"><input class="input" placeholder="Rechercher un métier, catégorie..." oninput="jobSearch=this.value;renderProfile()"><div class="chips">${CATEGORIES.map(c=>`<button class="chip ${jobFilter===c?'sel':''}" onclick="jobFilter='${c}';renderProfile()">${c}</button>`).join('')}</div></div><div class="section-title">Base métiers (${JOBS.length})</div><div class="list">${JOBS.filter(j=>(jobFilter==='Tous'||j.c===jobFilter)&&(!jobSearch||j.n.toLowerCase().includes(jobSearch.toLowerCase())||j.c.toLowerCase().includes(jobSearch.toLowerCase()))).map(j=>`<div class="job-row" onclick="data.pro.metier='${j.n}';data.pro.icon='${j.i}';save();updateTop();toast('Métier principal modifié')"><div><strong>${j.i} ${j.n}${j.g?'<span class="growth">⭐ croissance</span>':''}</strong><span>${j.c} · ${j.p.length} prestations indicatives</span></div><button class="btn btn-ghost btn-small">Choisir</button></div>`).join('')}</div>`;}
function saveProfile(){data.pro.name=val('pName');data.pro.company=val('pCompany');data.pro.phone=val('pPhone');data.pro.email=val('pEmail');data.pro.address=val('pAddress');data.pro.siret=val('pSiret');data.pro.tva=parseFloat(val('pTva'))||0;data.pro.validity=parseInt(val('pValidity'))||30;data.pro.terms=val('pTerms');save();updateTop();toast('✅ Profil sauvegardé');renderAll();}
function changeStatus(id,s){const q=data.quotes.find(x=>x.id===id);if(q){q.status=s;save();closeModal();renderAll();toast('Statut : '+statusLabel(s));}}
function deleteQuote(id){if(!confirm('Supprimer ce devis ?'))return;data.quotes=data.quotes.filter(q=>q.id!==id);save();closeModal();renderAll();toast('Supprimé');}
function sheet(html){document.getElementById('sheet').innerHTML=html;modal.classList.add('show');}
function closeModal(){modal.classList.remove('show');}
modal.onclick=e=>{if(e.target.id==='modal')closeModal();};
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function resetData(){if(!confirm('Effacer TOUTES les données ? Irréversible.'))return;localStorage.removeItem(STORE);location.reload();}
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
window.addEventListener('load',()=>{if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!localStorage.getItem('pwa_ok'))setTimeout(()=>{const b=document.createElement('div');b.innerHTML=`<div style="position:fixed;bottom:0;left:0;right:0;z-index:999;background:#1d2638;border-top:2px solid rgba(245,158,11,.4);padding:13px 15px 28px;display:flex;align-items:center;gap:12px;box-shadow:0 -6px 24px rgba(0,0,0,.5)"><span style="font-size:28px">🔧</span><div style="flex:1"><div style="font-weight:800;font-size:13px;color:#f8fafc">Installer DevisExpress</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">Appuyez sur <strong style="color:#f59e0b">Partager ↑</strong> puis <strong style="color:#f59e0b">Sur l'écran d'accueil</strong></div></div><button onclick="this.closest('div').parentNode.remove();localStorage.setItem('pwa_ok','1')" style="background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#f59e0b;border-radius:9px;padding:7px 10px;font-size:13px;font-weight:700">✕</button></div>`;document.body.appendChild(b);},4000);});
init();
</script>
</body>
</html>
