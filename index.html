<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0b0f17"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DevisExpress"/>
<meta name="description" content="Créez des devis professionnels en moins de 2 minutes."/>
<title>DevisExpress – Devis Pro Artisans</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{color-scheme:dark;--bg:#0b0f17;--surface:#151b28;--surface2:#1d2638;--border:#2d3a53;--border2:#3d4b68;--accent:#f59e0b;--accent2:#10b981;--danger:#ef4444;--txt:#f8fafc;--mut:#94a3b8;--dim:#64748b;--radius:18px;--shadow:0 20px 60px rgba(0,0,0,.35)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--txt);font-family:Sora,system-ui,sans-serif;overflow-x:hidden}
button,input,textarea,select{font-family:inherit}button{cursor:pointer;border:0}
.app{min-height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at 80% -10%,rgba(245,158,11,.13),transparent 35%),linear-gradient(180deg,#0b0f17,#0e1420)}
.screen{display:none;min-height:100dvh;flex-direction:column}.screen.active{display:flex;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 18px}
.login{width:min(430px,100%);background:rgba(21,27,40,.92);border:1px solid var(--border);border-radius:28px;padding:26px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
.brand{text-align:center;margin-bottom:24px}.brand-icon{font-size:54px;filter:drop-shadow(0 0 18px rgba(245,158,11,.35))}.brand h1{font-size:30px;letter-spacing:-1px}.brand h1 span{color:var(--accent)}.brand p{color:var(--mut);font-size:13px;margin-top:5px;line-height:1.5}
.label{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:block}
.grid-metier{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:12px 0 18px}
.metier{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:13px 8px;color:var(--mut);font-size:11px;text-align:center}.metier span{display:block;font-size:23px;margin-bottom:4px}.metier.sel{border-color:var(--accent);background:rgba(245,158,11,.11);color:var(--txt)}
.input,.textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:13px;color:var(--txt);padding:13px 14px;font-size:14px;outline:none}.textarea{min-height:80px;resize:vertical}.input:focus,.textarea:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:14px;padding:13px 15px;font-weight:700;font-size:13px;transition:.18s}
.btn-primary{background:var(--accent);color:#111827}.btn-green{background:var(--accent2);color:white}.btn-red{background:rgba(239,68,68,.14);color:#fecaca;border:1px solid rgba(239,68,68,.25)}.btn-ghost{background:var(--surface2);color:var(--txt);border:1px solid var(--border)}
.btn-primary:active,.btn-green:active,.btn-ghost:active{transform:scale(.98)}.btn-small{padding:9px 11px;border-radius:11px;font-size:12px}.full{width:100%}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(15,17,23,.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.logo{font-weight:800}.logo span{color:var(--accent)}.top-actions{display:flex;gap:8px;align-items:center}
.badge{font-size:11px;color:var(--accent);background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.24);padding:6px 10px;border-radius:999px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#111827;display:flex;align-items:center;justify-content:center;font-weight:800}
.content{flex:1;width:100%;max-width:1050px;margin:0 auto;padding:18px 16px 88px}
.hgroup{margin:6px 0 18px}.hgroup h2{font-size:23px;letter-spacing:-.5px}.hgroup p{font-size:13px;color:var(--mut);margin-top:5px;line-height:1.5}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.7px}.stat-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:700;margin-top:7px}.stat-sub{font-size:11px;color:var(--dim);margin-top:3px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.section-title{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px}
.list{display:flex;flex-direction:column;gap:9px}
.quote-row,.client-row{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:13px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.quote-row:active,.client-row:active{background:var(--surface2)}
.quote-row strong,.client-row strong{font-size:13px}.quote-row span,.client-row span{font-size:11px;color:var(--mut);display:block;margin-top:3px}
.money{font-family:'DM Mono',monospace;font-weight:700;font-size:14px;white-space:nowrap}
.status{font-size:9px;padding:4px 8px;border-radius:999px;font-weight:800;letter-spacing:.5px;white-space:nowrap}
.s-draft{background:rgba(148,163,184,.16);color:#cbd5e1}.s-sent{background:rgba(96,165,250,.15);color:#93c5fd}.s-accepted{background:rgba(16,185,129,.15);color:#6ee7b7}.s-refused{background:rgba(239,68,68,.12);color:#fca5a5}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:25;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(21,27,40,.96);border-top:1px solid var(--border);backdrop-filter:blur(16px);padding-bottom:env(safe-area-inset-bottom)}
.nav button{background:transparent;color:var(--dim);font-size:10px;padding:10px 2px}.nav button span{display:block;font-size:20px;margin-bottom:2px}.nav button.active{color:var(--accent)}
.stepbar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0 18px}
.step{border-bottom:2px solid var(--border);padding:10px 2px;text-align:center;font-size:11px;color:var(--dim);font-weight:700;cursor:pointer;transition:.2s}.step.active{color:var(--accent);border-color:var(--accent)}.step.done{color:var(--accent2);border-color:var(--accent2)}
.form{display:flex;flex-direction:column;gap:14px}
.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:8px 12px;color:var(--mut);font-size:12px}.chip.sel{color:var(--accent);border-color:var(--accent);background:rgba(245,158,11,.1)}
.prestation{display:grid;grid-template-columns:28px 1fr auto;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:12px}
.prestation.sel{border-color:var(--accent);background:rgba(245,158,11,.06)}
.check{color:var(--dim);font-size:18px}.prestation.sel .check{color:var(--accent)}.pname{font-size:13px;font-weight:650}.punit{font-size:11px;color:var(--mut);margin-top:2px}
.qty{grid-column:1/4;display:none;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:10px}.prestation.sel .qty{display:flex}
.qty-controls{display:flex;gap:8px;align-items:center}.qty button{width:34px;height:34px;border-radius:10px;background:var(--surface2);color:var(--txt);border:1px solid var(--border);font-size:18px}.qty input{width:60px;text-align:center}
.totalbar{position:sticky;bottom:70px;z-index:10;background:rgba(21,27,40,.95);border:1px solid rgba(245,158,11,.25);border-radius:18px;padding:14px;margin-top:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow);backdrop-filter:blur(14px)}
.totalht{font-family:'DM Mono',monospace;font-size:21px;color:var(--accent);font-weight:800}
.small{font-size:11px;color:var(--mut);line-height:1.4}
.pdf{background:white;color:#111827;border-radius:18px;padding:26px;box-shadow:var(--shadow)}
.pdf-head{display:flex;justify-content:space-between;gap:18px;border-bottom:2px solid #e5e7eb;padding-bottom:16px;margin-bottom:18px}
.pdf-logo{font-weight:900;font-size:22px;color:#111827}.pdf-logo span{color:#f59e0b}
.pdf-muted{color:#64748b;font-size:11px;line-height:1.7}
.pdf-block{background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:12px;font-size:12px;line-height:1.7;color:#374151}
.pdf-title{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.pdf-table{width:100%;border-collapse:collapse;font-size:11px}.pdf-table th{background:#111827;color:white;text-align:left;padding:9px}.pdf-table td{border-bottom:1px solid #e5e7eb;padding:9px;color:#374151}
.pdf-totals{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-top:12px;font-size:12px;color:#374151}
.pdf-final{font-size:17px;font-weight:900;border-top:2px solid #111827;padding-top:7px;color:#111827}
.pdf-sign{display:flex;justify-content:space-between;align-items:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid #e5e7eb;font-size:11px;color:#64748b}
.sign-box{border:1.5px dashed #cbd5e1;border-radius:8px;width:150px;height:48px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#94a3b8;text-align:center}
.pdf-footer{border-top:1px solid #e5e7eb;margin-top:16px;padding-top:12px;text-align:center;color:#94a3b8;font-size:10px;line-height:1.5}
.actions{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:9px;margin-top:13px}
.empty{background:var(--surface);border:1px dashed var(--border2);border-radius:18px;padding:22px;text-align:center;color:var(--mut);font-size:13px;line-height:1.7}
.toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%) translateY(30px);background:var(--accent2);color:white;font-size:13px;font-weight:800;border-radius:13px;padding:12px 18px;opacity:0;transition:.25s;z-index:80;box-shadow:var(--shadow);white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:60}.modal.show{display:flex}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:20px;width:100%;max-height:88dvh;overflow:auto}.sheet h3{margin-bottom:10px;font-size:16px}
.danger-zone{border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.07);border-radius:16px;padding:14px;margin-top:20px}
.share-opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.share-opt{display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:.15s;text-decoration:none;color:var(--txt)}
.share-opt:active{transform:scale(.98)}.share-opt-icon{font-size:26px;flex-shrink:0}
.share-opt strong{display:block;font-size:13px}.share-opt span{font-size:11px;color:var(--mut)}
@media(min-width:760px){.nav{left:50%;transform:translateX(-50%);max-width:760px;border-radius:24px 24px 0 0;border-left:1px solid var(--border);border-right:1px solid var(--border)}.content{padding:24px 22px 105px}.cards{gap:14px}.quick{grid-template-columns:1fr 1fr 1fr}.sheet{max-width:620px;margin:auto;border-radius:24px}.modal{align-items:center}.actions{grid-template-columns:1fr 1fr 1fr}.pdf{padding:36px}}
@media(max-width:520px){.cards{grid-template-columns:1fr 1fr}.cards .card:last-child{grid-column:1/3}.row{grid-template-columns:1fr}.quick{grid-template-columns:1fr}.pdf{padding:18px;border-radius:14px}.pdf-head{flex-direction:column}.pdf-table{font-size:10px}.pdf-table th,.pdf-table td{padding:7px 5px}.actions{grid-template-columns:1fr}.totalbar{bottom:66px}.login{padding:22px}.grid-metier{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <section id="login" class="screen active">
    <div class="center"><div class="login">
      <div class="brand"><div class="brand-icon">🧾</div><h1>Devis<span>Express</span></h1><p>Devis professionnel en moins de 2 minutes, pour artisans et indépendants.</p></div>
      <label class="label">Votre métier</label>
      <div class="grid-metier" id="metierGrid"></div>
      <div class="row">
        <div><label class="label">Nom entreprise</label><input id="proCompanyStart" class="input" placeholder="Ex : Dubois Plomberie"></div>
        <div><label class="label">Votre prénom</label><input id="proNameStart" class="input" placeholder="Ex : Marc"></div>
      </div>
      <button class="btn btn-primary full" style="margin-top:16px" onclick="enterApp()">Accéder à mon espace →</button>
    </div></div>
  </section>
  <section id="appScreen" class="screen">
    <header class="topbar">
      <div class="logo">Devis<span>Express</span></div>
      <div class="top-actions"><div class="badge" id="metierBadge">🔧 Plombier</div><div class="avatar" id="avatar">M</div></div>
    </header>
    <main class="content">
      <div id="viewHome"></div>
      <div id="viewQuote" style="display:none"></div>
      <div id="viewClients" style="display:none"></div>
      <div id="viewArchive" style="display:none"></div>
      <div id="viewProfile" style="display:none"></div>
    </main>
    <nav class="nav">
      <button class="active" onclick="setView('home',this)"><span>🏠</span>Accueil</button>
      <button onclick="startQuote();setView('quote',this)"><span>➕</span>Devis</button>
      <button onclick="setView('clients',this)"><span>👥</span>Clients</button>
      <button onclick="setView('archive',this)"><span>📁</span>Archive</button>
      <button onclick="setView('profile',this)"><span>⚙️</span>Profil</button>
    </nav>
  </section>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<script>
const STORE='devisexpress_v2';
const today=new Date();
const fmtEUR=n=>(Math.round(n||0)).toLocaleString('fr-FR')+' €';
const METIERS=[['Plombier','🔧'],['Électricien','⚡'],['Peintre','🖌️'],['Menuisier','🪵'],['Carreleur','🏠'],['Maçon','🧱'],['Couvreur','🏚️'],['Paysagiste','🌿'],['Photographe','📸'],['Designer','🎨']];
const CAT={
  'Plombier':[['Débouchage canalisation',85,'forfait'],['Remplacement robinet/mitigeur',120,'u.'],['Réparation fuite',150,'forfait'],['Remplacement chauffe-eau',650,'forfait'],['Installation douche italienne',1800,'forfait'],['Détartrage chauffe-eau',95,'forfait'],['Main d\'œuvre',65,'h']],
  'Électricien':[['Mise aux normes tableau',450,'forfait'],['Installation prise/interrupteur',75,'u.'],['Pose luminaire/plafonnier',90,'u.'],['Câblage réseau',120,'point'],['Borne recharge VE',1200,'forfait'],['Détecteur fumée',55,'u.'],['Main d\'œuvre',60,'h']],
  'Peintre':[['Peinture murs (2 couches)',18,'m²'],['Peinture plafond',22,'m²'],['Lessivage/préparation',8,'m²'],['Pose papier peint',35,'m²'],['Peinture façade',45,'m²'],['Sous-couche',10,'m²'],['Main d\'œuvre',55,'h']],
  'Menuisier':[['Pose porte intérieure',280,'u.'],['Fenêtre double vitrage',650,'u.'],['Parquet flottant',35,'m²'],['Escalier sur mesure',3500,'forfait'],['Placard sur mesure',1200,'u.'],['Baie vitrée',1800,'u.'],['Main d\'œuvre',65,'h']],
  'Carreleur':[['Pose carrelage sol',45,'m²'],['Pose faïence murs',55,'m²'],['Dépose carrelage',15,'m²'],['Ragréage sol',12,'m²'],['Joints époxy',20,'m²'],['Imperméabilisation',18,'m²'],['Main d\'œuvre',55,'h']],
  'Maçon':[['Enduit façade',40,'m²'],['Démolition cloison',35,'m²'],['Mur béton',180,'m²'],['Dalle béton',85,'m²'],['Chape liquide',25,'m²'],['Ouverture/linteau',1200,'forfait'],['Main d\'œuvre',55,'h']],
  'Couvreur':[['Réfection toiture tuiles',120,'m²'],['Pose gouttières',45,'ml'],['Nettoyage toiture',15,'m²'],['Traitement hydrofuge',20,'m²'],['Pose Velux',850,'u.'],['Réparation tuiles',250,'forfait'],['Main d\'œuvre',65,'h']],
  'Paysagiste':[['Tonte pelouse',45,'forfait'],['Taille haie',35,'h'],['Création massifs',280,'forfait'],['Gazon synthétique',65,'m²'],['Arrosage automatique',1500,'forfait'],['Terrassement',30,'m²'],['Main d\'œuvre',50,'h']],
  'Photographe':[['Shooting portrait',180,'forfait'],['Reportage événement',650,'forfait'],['Retouche photo',25,'photo'],['Album numérique',120,'forfait'],['Vidéo/reel',350,'forfait'],['Heure supplémentaire',90,'h']],
  'Designer':[['Logo professionnel',350,'forfait'],['Identité visuelle',950,'forfait'],['Flyer/affiche',180,'u.'],['Maquette réseau social',90,'u.'],['Charte graphique',650,'forfait'],['Correction/retouche',60,'h']]
};

let data={pro:{name:'',company:'',phone:'',email:'',siret:'',address:'',metier:'Plombier',icon:'🔧',tva:10,validity:30,terms:'Devis valable 30 jours. Acompte de 30% à la commande. Solde à réception de facture.'},quotes:[],clients:[]};
let draft=null,step=1,currentView='home';

function save(){localStorage.setItem(STORE,JSON.stringify(data));}
function load(){const r=localStorage.getItem(STORE);if(r)try{data=JSON.parse(r);}catch(e){}}
function devNum(){return 'DEV-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);}
function val(id){return(document.getElementById(id)?.value||'').trim();}
function totals(q){const ht=q.items.reduce((s,i)=>s+i.price*i.qty,0),tva=Math.round(ht*(data.pro.tva||0)/100);return{ht,tva,ttc:ht+tva};}
function statusLabel(s){return{draft:'BROUILLON',sent:'ENVOYÉ',accepted:'ACCEPTÉ',refused:'REFUSÉ'}[s]||s;}

function init(){
  load();
  renderMetiers();
  if(data.pro.company)document.getElementById('proCompanyStart').value=data.pro.company;
  if(data.pro.name)document.getElementById('proNameStart').value=data.pro.name;
  updateTop();renderAll();
}

function renderMetiers(){
  const g=document.getElementById('metierGrid');g.innerHTML='';
  METIERS.forEach(m=>{const b=document.createElement('button');b.className='metier'+(m[0]===data.pro.metier?' sel':'');b.innerHTML='<span>'+m[1]+'</span>'+m[0];b.onclick=()=>{data.pro.metier=m[0];data.pro.icon=m[1];renderMetiers();updateTop();};g.appendChild(b);});
}

function enterApp(){
  const n=val('proNameStart'),c=val('proCompanyStart');
  if(!n)return toast('⚠️ Entrez votre prénom');
  data.pro.name=n;data.pro.company=c||n;
  save();updateTop();
  document.getElementById('login').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  renderAll();
}

function updateTop(){
  document.getElementById('metierBadge').textContent=data.pro.icon+' '+data.pro.metier;
  document.getElementById('avatar').textContent=(data.pro.name||'?')[0].toUpperCase();
}

function setView(v,btn){
  currentView=v;
  ['Home','Quote','Clients','Archive','Profile'].forEach(x=>document.getElementById('view'+x).style.display='none');
  document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).style.display='block';
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderAll();window.scrollTo(0,0);
}

function renderAll(){renderHome();renderQuote();renderClients();renderArchive();renderProfile();}

// ── HOME
function renderHome(){
  const sent=data.quotes.filter(q=>q.status==='sent').length;
  const acc=data.quotes.filter(q=>q.status==='accepted').length;
  const ca=data.quotes.filter(q=>q.status!=='refused').reduce((s,q)=>s+totals(q).ttc,0);
  document.getElementById('viewHome').innerHTML=`
  <div class="hgroup"><h2>Bonjour, ${data.pro.name||'!'} 👋</h2>
  <p>${today.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} · ${sent} en attente</p></div>
  <div class="cards">
    <div class="card"><div class="stat-label">Devis</div><div class="stat-val">${data.quotes.length}</div><div class="stat-sub">créés</div></div>
    <div class="card"><div class="stat-label">Acceptés</div><div class="stat-val">${acc}</div><div class="stat-sub">${data.quotes.length?Math.round(acc/data.quotes.length*100):0}%</div></div>
    <div class="card"><div class="stat-label">CA TTC</div><div class="stat-val" style="font-size:16px">${fmtEUR(ca)}</div><div class="stat-sub">estimé</div></div>
  </div>
  <div class="quick">
    <button class="btn btn-primary" onclick="startQuote();setView('quote',document.querySelectorAll('.nav button')[1])">➕ Nouveau devis</button>
    <button class="btn btn-ghost" onclick="openClientSheet()">👥 Ajouter client</button>
  </div>
  <div class="section-title">Derniers devis</div>
  <div class="list">${quoteRows(data.quotes.slice().reverse().slice(0,6))}</div>`;
}

function quoteRows(arr){
  if(!arr.length)return'<div class="empty">Aucun devis pour le moment.<br><br>Appuyez sur <strong>➕ Nouveau devis</strong> pour commencer.</div>';
  return arr.map(q=>{const t=totals(q);return`<div class="quote-row" onclick="openQuote('${q.id}')"><div><strong>${q.client.name}</strong><span>${q.id} · ${new Date(q.date).toLocaleDateString('fr-FR')} · ${q.items.length} ligne(s)</span></div><div style="text-align:right"><div class="money">${fmtEUR(t.ttc)}</div><div class="status s-${q.status}">${statusLabel(q.status)}</div></div></div>`;}).join('');
}

// ── DEVIS
function startQuote(){draft={id:devNum(),date:new Date().toISOString(),status:'draft',client:{name:'',phone:'',email:'',address:''},items:[],type:'Intervention',note:''};step=1;}

function goStep(n){if(n>1)saveClientStep();step=n;renderQuote();window.scrollTo(0,0);}

function renderQuote(){
  if(!draft)startQuote();
  const bar=`<div class="stepbar">
    <div class="step ${step===1?'active':step>1?'done':''}" onclick="${step>1?'goStep(1)':''}">① Client</div>
    <div class="step ${step===2?'active':step>2?'done':''}" onclick="${step>2?'goStep(2)':''}">② Prestations</div>
    <div class="step ${step===3?'active':''}">③ Aperçu</div></div>`;
  let html=`<div class="hgroup"><h2>Nouveau devis</h2><p>Étape ${step}/3</p></div>${bar}`;
  if(step===1)html+=stepClient();
  if(step===2)html+=stepItems();
  if(step===3)html+=previewHtml(draft,true);
  document.getElementById('viewQuote').innerHTML=html;
}

function stepClient(){
  return`<div class="form">
  <div><label class="label">Nom client *</label><input class="input" id="cName" value="${draft.client.name}" placeholder="Ex : Famille Martin"></div>
  <div class="row">
    <div><label class="label">Téléphone</label><input class="input" id="cPhone" value="${draft.client.phone}" placeholder="06 12 34 56 78"></div>
    <div><label class="label">Email</label><input class="input" id="cEmail" value="${draft.client.email}" placeholder="client@email.fr"></div>
  </div>
  <div><label class="label">Adresse chantier</label><input class="input" id="cAddress" value="${draft.client.address}" placeholder="Adresse complète"></div>
  <div><label class="label">Notes / description</label><textarea class="textarea" id="cNote" placeholder="Décrivez l'intervention...">${draft.note||''}</textarea></div>
  <div><label class="label">Type intervention</label>
    <div class="chips">${['Urgence','Rénovation','Installation','Entretien','Diagnostic'].map(x=>`<button class="chip ${draft.type===x?'sel':''}" onclick="draft.type='${x}';renderQuote()">${x}</button>`).join('')}</div>
  </div>
  <button class="btn btn-primary full" onclick="goStep(2)">Choisir les prestations →</button>
  </div>`;
}

function saveClientStep(){
  draft.client={
    name:val('cName')||draft.client.name||'Client',
    phone:val('cPhone')||draft.client.phone||'',
    email:val('cEmail')||draft.client.email||'',
    address:val('cAddress')||draft.client.address||''
  };
  draft.note=val('cNote')||draft.note||'';
}

function stepItems(){
  const cat=(CAT[data.pro.metier]||CAT['Plombier']).map((p,i)=>({id:i,name:p[0],price:p[1],unit:p[2]}));
  const t=totals(draft);
  return`<div class="list">${cat.map(p=>prestHtml(p)).join('')}</div>
  <button class="btn btn-ghost full" style="margin-top:10px" onclick="openCustomItem()">➕ Ajouter une ligne personnalisée</button>
  <div class="totalbar">
    <div><div class="small">Total HT</div><div class="totalht">${fmtEUR(t.ht)}</div><div class="small">TVA ${data.pro.tva}% · TTC ${fmtEUR(t.ttc)}</div></div>
    <button class="btn btn-primary" onclick="goStep(3)">Aperçu →</button>
  </div>`;
}

function prestHtml(p){
  const item=draft.items.find(i=>i.name===p.name),sel=!!item;
  const nm=p.name.replace(/'/g,"\\'");
  return`<div class="prestation ${sel?'sel':''}" onclick="toggleItem('${nm}',${p.price},'${p.unit}')">
  <div class="check">${sel?'✓':'○'}</div>
  <div><div class="pname">${p.name}</div><div class="punit">${p.price} € / ${p.unit}</div></div>
  <div class="money">${sel?fmtEUR(item.price*item.qty):fmtEUR(p.price)}</div>
  ${sel?`<div class="qty" onclick="event.stopPropagation()"><span class="small">Quantité</span><div class="qty-controls">
    <button onclick="chgQty('${nm}',-1)">−</button>
    <input class="input" value="${item.qty}" onchange="setQty('${nm}',this.value)" style="width:60px;text-align:center">
    <button onclick="chgQty('${nm}',1)">+</button>
  </div></div>`:''}
  </div>`;
}

function toggleItem(name,price,unit){const i=draft.items.findIndex(x=>x.name===name);if(i>=0)draft.items.splice(i,1);else draft.items.push({name,price,unit,qty:1});renderQuote();}
function chgQty(name,d){const i=draft.items.find(x=>x.name===name);if(i){i.qty=Math.max(1,(+i.qty||1)+d);renderQuote();}}
function setQty(name,v){const i=draft.items.find(x=>x.name===name);if(i){i.qty=Math.max(1,parseFloat(v)||1);renderQuote();}}

function openCustomItem(){
  sheet(`<h3>➕ Prestation personnalisée</h3><div class="form">
  <div><label class="label">Désignation *</label><input id="xName" class="input" placeholder="Ex : Déplacement urgence"></div>
  <div class="row">
    <div><label class="label">Prix HT (€) *</label><input id="xPrice" class="input" type="number" placeholder="0" min="0"></div>
    <div><label class="label">Unité</label><input id="xUnit" class="input" placeholder="h, m², forfait, u."></div>
  </div>
  <div><label class="label">Quantité</label><input id="xQty" class="input" type="number" value="1" min="1"></div>
  <button class="btn btn-primary full" onclick="addCustomItem()">Ajouter au devis</button>
  </div>`);
}

function addCustomItem(){
  const name=val('xName'),price=parseFloat(val('xPrice')),unit=val('xUnit')||'forfait',qty=parseFloat(val('xQty'))||1;
  if(!name||!price)return toast('⚠️ Désignation et prix obligatoires');
  draft.items.push({name,price,unit,qty});closeModal();renderQuote();toast('✅ Prestation ajoutée');
}

// ── APERÇU (identique au PDF imprimé)
function previewHtml(q,withActions){
  const t=totals(q);
  const exp=new Date(q.date);exp.setDate(exp.getDate()+(data.pro.validity||30));
  const rows=q.items.map(i=>`<tr><td>${i.name}</td><td style="text-align:center">${i.qty}</td><td>${i.unit}</td><td style="text-align:right">${fmtEUR(i.price)}</td><td style="text-align:right">${fmtEUR(i.price*i.qty)}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:12px">Aucune prestation sélectionnée</td></tr>';
  return`<div class="pdf" id="pdfArea">
  <div class="pdf-head">
    <div><div class="pdf-logo">${data.pro.company||'DevisExpress'}<span>.</span></div>
    <div class="pdf-muted" style="margin-top:5px"><strong style="color:#111827">${data.pro.metier} ${data.pro.icon}</strong><br>${data.pro.phone||''}<br>${data.pro.email||''}<br>${data.pro.siret?'SIRET : '+data.pro.siret:''}</div></div>
    <div class="pdf-muted" style="text-align:right"><strong style="color:#111827;font-size:14px">${q.id}</strong><br>Date : ${new Date(q.date).toLocaleDateString('fr-FR')}<br>Validité : ${exp.toLocaleDateString('fr-FR')}</div>
  </div>
  <div class="pdf-title">Client</div>
  <div class="pdf-block"><strong>${q.client.name||'Client'}</strong><br>${q.client.address||'Adresse non renseignée'}<br>${q.client.phone?'📞 '+q.client.phone:''}${q.client.email?' · '+q.client.email:''}</div>
  ${q.note?`<div class="pdf-title">Notes</div><div class="pdf-block">${q.note}</div>`:''}
  <div class="pdf-title">Détail des prestations</div>
  <table class="pdf-table"><thead><tr><th>Prestation</th><th style="text-align:center">Qté</th><th>Unité</th><th style="text-align:right">P.U. HT</th><th style="text-align:right">Total HT</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="pdf-totals"><div>Sous-total HT : <strong>${fmtEUR(t.ht)}</strong></div><div>TVA ${data.pro.tva}% : <strong>${fmtEUR(t.tva)}</strong></div><div class="pdf-final">Total TTC : ${fmtEUR(t.ttc)}</div></div>
  <div class="pdf-sign"><div class="pdf-muted"><strong>${data.pro.company||data.pro.name}</strong><br>${data.pro.address||''}</div><div style="text-align:center"><div style="font-size:9px;color:#64748b;margin-bottom:4px">Bon pour accord – Signature client</div><div class="sign-box">Signature + date</div></div></div>
  <div class="pdf-title">Conditions</div><div class="pdf-block">${data.pro.terms||'Devis valable 30 jours.'}</div>
  <div class="pdf-footer">Devis généré avec DevisExpress</div>
  </div>
  ${withActions?`<div class="actions"><button class="btn btn-ghost" onclick="goStep(2)">← Modifier</button><button class="btn btn-ghost" onclick="downloadPDF(draft)">📄 PDF</button><button class="btn btn-green" onclick="saveAndShare()">📤 Enregistrer & envoyer</button></div>`:''}`;
}

// ── SAUVEGARDE
function saveQuote(q,status){
  if(!q.client.name||q.client.name==='Client')return toast('⚠️ Nom client obligatoire');
  if(!q.items.length)return toast('⚠️ Ajoute au moins une prestation');
  q.status=status;
  const idx=data.quotes.findIndex(x=>x.id===q.id);
  if(idx>=0)data.quotes[idx]=JSON.parse(JSON.stringify(q));
  else data.quotes.push(JSON.parse(JSON.stringify(q)));
  if(!data.clients.some(c=>c.name.toLowerCase()===q.client.name.toLowerCase()))
    data.clients.push({...q.client});
  save();
}

function saveAndShare(){
  saveClientStep();
  if(!draft.client.name||draft.client.name==='Client')return toast('⚠️ Nom client obligatoire');
  if(!draft.items.length)return toast('⚠️ Ajoute au moins une prestation');
  saveQuote(draft,'sent');
  const saved=data.quotes.find(x=>x.id===draft.id);
  toast('✅ Devis sauvegardé');
  startQuote();
  if(saved)openShareModal(saved);
  else setView('home',document.querySelectorAll('.nav button')[0]);
}

  .totals{text-align:right;margin-top:10px;font-size:11px;line-height:1.9}
  .final{font-size:15px;font-weight:900;border-top:2px solid #111827;padding-top:5px;margin-top:4px}
  .sign-row{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #e5e7eb;align-items:flex-end}
  .sign-box{border:1.5px dashed #cbd5e1;border-radius:6px;width:140px;height:44px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#94a3b8;text-align:center}
  .footer{border-top:1px solid #e5e7eb;margin-top:14px;padding-top:8px;text-align:center;color:#94a3b8;font-size:8px}

    <div><div class="logo">${data.pro.company||'DevisExpress'}<span>.</span></div>
    <div class="muted" style="margin-top:5px">${data.pro.metier} ${data.pro.icon}<br>${data.pro.phone||''}<br>${data.pro.email||''}<br>${data.pro.siret?'SIRET : '+data.pro.siret:''}<br>${data.pro.address||''}</div></div>
    <div class="muted" style="text-align:right"><strong style="font-size:13px;color:#111827">${q.id}</strong><br>Date : ${new Date(q.date).toLocaleDateString('fr-FR')}<br>Validité : ${exp.toLocaleDateString('fr-FR')}</div>
  </div>
  <div class="sec">Client</div>
  <div class="block"><strong>${q.client.name}</strong><br>${q.client.address||''}<br>${q.client.phone?'Tél : '+q.client.phone:''} ${q.client.email?'· '+q.client.email:''}</div>
  ${q.note?`<div class="sec">Notes</div><div class="block">${q.note}</div>`:''}
  <div class="sec">Détail des prestations</div>
  <table><thead><tr><th>Prestation</th><th>Qté</th><th>Unité</th><th align="right">P.U. HT</th><th align="right">Total HT</th></tr></thead>

function downloadPDFById(id){const q=data.quotes.find(x=>x.id===id);if(q)downloadPDF(q);}

// ── PARTAGE
function openShareModal(q){
  const t=totals(q);
  const tel=(q.client.phone||'').replace(/\D/g,'').replace(/^0/,'+33');
  const msg=`Bonjour ${q.client.name},\n\nVeuillez trouver votre devis *${q.id}* pour un montant de *${fmtEUR(t.ttc)} TTC*.\n\nCe devis est valable ${data.pro.validity||30} jours.\n\nCordialement,\n${data.pro.company||data.pro.name}\n${data.pro.phone||''}`;
  const msgE=encodeURIComponent(msg);
  const subj=encodeURIComponent(`Votre devis ${q.id} – ${data.pro.company||data.pro.name}`);
  const bodyE=encodeURIComponent(`Bonjour ${q.client.name},\n\nVeuillez trouver en pièce jointe votre devis ${q.id} d'un montant de ${fmtEUR(t.ttc)} TTC.\n\nCe devis est valable ${data.pro.validity||30} jours.\n\nCordialement,\n${data.pro.company||data.pro.name}\n${data.pro.phone||''}\n${data.pro.email||''}`);
  sheet(`<h3>📤 Envoyer le devis</h3>
  <p style="font-size:12px;color:var(--mut);margin-bottom:14px">${q.id} · <strong>${q.client.name}</strong> · ${fmtEUR(t.ttc)}</p>
  <div class="share-opts">
    <div class="share-opt" onclick="window.open('https://wa.me/${tel}?text=${msgE}','_blank');closeModal();toast('💬 WhatsApp ouvert !')">
      <div class="share-opt-icon">💬</div><div><strong>WhatsApp</strong><span>Message résumé · joindre le PDF manuellement après</span></div>
    </div>
    <div class="share-opt" onclick="window.location.href='mailto:${q.client.email||''}?subject=${subj}&body=${bodyE}';closeModal()">
      <div class="share-opt-icon">📧</div><div><strong>Email</strong><span>Ouvre votre appli mail avec le texte pré-rempli</span></div>
    </div>
    <div class="share-opt" onclick="downloadPDFById('${q.id}');closeModal()">
      <div class="share-opt-icon">📄</div><div><strong>Télécharger PDF</strong><span>Identique à l'aperçu · à partager ensuite</span></div>
    </div>
    <div class="share-opt" onclick="copyTxt('${q.id}')">
      <div class="share-opt-icon">📋</div><div><strong>Copier le texte</strong><span>À coller dans n'importe quelle app</span></div>
    </div>
  </div>
  <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:12px;padding:11px;margin-top:12px;font-size:11px;color:var(--mut);line-height:1.6">
    💡 <strong style="color:var(--accent)">Astuce PDF + WhatsApp :</strong> téléchargez d'abord le PDF, puis ouvrez WhatsApp et joignez le fichier dans votre conversation client.
  </div>
  <button class="btn btn-ghost full" style="margin-top:12px" onclick="closeModal()">Fermer</button>`);
}

function copyTxt(id){
  const q=data.quotes.find(x=>x.id===id);if(!q)return;
  const t=totals(q);
  const msg=`Bonjour ${q.client.name},\n\nVotre devis ${q.id} : ${fmtEUR(t.ttc)} TTC.\nValable ${data.pro.validity||30} jours.\n\n${data.pro.company||data.pro.name}\n${data.pro.phone||''}`;
  if(navigator.share){navigator.share({text:msg}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(msg).then(()=>toast('✅ Texte copié !'));}
  closeModal();
}

function shareQuote(id){const q=data.quotes.find(x=>x.id===id);if(q)openShareModal(q);}

// ── OUVRIR DEVIS
function openQuote(id){
  const q=data.quotes.find(x=>x.id===id);if(!q)return;
  sheet(previewHtml(q,false)+`
  <div class="actions" style="margin-top:12px">
    <button class="btn btn-ghost" onclick="downloadPDFById('${id}')">📄 PDF</button>
    <button class="btn btn-green" onclick="shareQuote('${id}')">📤 Envoyer</button>
    <button class="btn btn-red" onclick="deleteQuote('${id}')">🗑️</button>

  <div class="actions" style="margin-top:8px">
    <button class="btn btn-ghost" onclick="changeStatus('${id}','accepted')">✅ Accepté</button>
    <button class="btn btn-ghost" onclick="changeStatus('${id}','refused')">❌ Refusé</button>
    <button class="btn btn-ghost" onclick="changeStatus('${id}','sent')">📤 Envoyé</button>
  </div>`);
}

}

}

function saveProfile(){
  data.pro.name=val('pName');data.pro.company=val('pCompany');data.pro.phone=val('pPhone');
  data.pro.email=val('pEmail');data.pro.address=val('pAddress');data.pro.siret=val('pSiret');
  data.pro.tva=parseFloat(val('pTva'))||0;data.pro.validity=parseInt(val('pValidity'))||30;
  data.pro.terms=val('pTerms');save();updateTop();toast('✅ Profil sauvegardé');renderAll();
}

// ── UTILS
function changeStatus(id,s){const q=data.quotes.find(x=>x.id===id);if(q){q.status=s;save();closeModal();renderAll();toast('Statut : '+statusLabel(s));}}
function deleteQuote(id){if(!confirm('Supprimer ce devis ?'))return;data.quotes=data.quotes.filter(q=>q.id!==id);save();closeModal();renderAll();toast('Supprimé');}
function sheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function resetData(){if(!confirm('Effacer TOUTES les données ? Irréversible.'))return;localStorage.removeItem(STORE);location.reload();}

// ── PWA
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

// ── BANNIÈRE IPHONE

      document.body.appendChild(b);
    },4000);
  }
});

init();
</script>
